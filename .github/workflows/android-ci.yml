name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - refactor/**
      - feature/**
      - chore/**
      - fix/**
      - codex/**
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test-lint:
    name: Build, Unit Test, Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run rework metrics checks
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/quality/rework-metrics-check.sh --pr "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"

      - name: Run product harness checks
        run: |
          scripts/quality/product-harness-check-test.sh
          scripts/quality/product-harness-check.sh
          scripts/quality/rework-metrics-check-test.sh

      - name: Run unit tests
        run: ./gradlew --stacktrace testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --stacktrace assembleDebug

      - name: Run strict lint (all variants)
        run: ./gradlew --stacktrace lint

      - name: Verify non-view coverage
        run: ./gradlew --stacktrace coverageVerifyAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
          if-no-files-found: warn

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
            **/build/reports/lint-results*.sarif
          if-no-files-found: warn

      - name: Upload general build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/**
            **/build/outputs/logs/**
            **/build/reports/jacoco/**
          if-no-files-found: warn
